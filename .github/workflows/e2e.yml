name: E2E

# Workflow separado del CI principal a propósito: los E2E con navegador son más
# lentos y frágiles, así que NO bloquean los checks requeridos de ci.yml mientras
# se estabilizan. Cuando esté probado en verde, se puede promover a requerido.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E (chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Instalar dependencias
        run: yarn install --frozen-lockfile

      - name: Instalar navegador (chromium) con sus libs de sistema
        run: yarn playwright install --with-deps chromium

      - name: Build de la app
        run: yarn build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Correr E2E
        run: yarn playwright test

      - name: Subir el reporte de Playwright
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
